name: TASI AI — مضارب

on:
  workflow_dispatch:
  schedule:
    # السوق السعودي: الأحد-الخميس 10:00ص - 3:00م KSA
    # KSA = UTC+3 → يعني 7:00 - 12:00 UTC
    # كل 30 دقيقة أثناء السوق
    - cron: "0,30 7-11 * * 0-4"
    # إضافة 12:00 UTC (3:00م KSA — آخر دقائق السوق)
    - cron: "0 12 * * 0-4"

    # التقرير الأسبوعي: كل خميس 4:00م KSA (13:00 UTC)
    - cron: "0 13 * * 4"

jobs:

  # ─── الوظيفة الرئيسية: فحص وإصدار الإشارة ───────────────
  auto-post:
    runs-on: ubuntu-latest
    # يشتغل فقط في أوقات السوق — ليس وقت التقرير
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' &&
       !contains('0 13 * * 4', github.event.schedule))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: pip install -r requirements.txt

      # ── 1. جلب بيانات السوق وتحليلها ──────────────────────
      - name: Fetch & Analyze Market Data
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/fetch_api_data.py

      # ── 2. فحص جودة الإشارة ────────────────────────────────
      - name: Check Signal Quality
        id: quality_check
        run: python scripts/should_post.py

      # ── 3. توليد الصورة ────────────────────────────────────
      - name: Generate Post Image
        run: python scripts/generate_post.py

      # ── 4. تسجيل الإشارة ───────────────────────────────────
      - name: Log Signal
        run: python scripts/log_signal.py
        continue-on-error: true

      # ── 5. رفع الصورة على GitHub ───────────────────────────
      - name: Upload output.png to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/upload_output.py

      # ── 6. نشر على Telegram ────────────────────────────────
      - name: Post to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/post_to_telegram.py

      # ── 7. نشر على Facebook ────────────────────────────────
      - name: Post to Facebook
        env:
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IMAGE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/output.png
        run: python scripts/post_to_facebook.py
        continue-on-error: true

      # ── 8. نشر على Instagram ───────────────────────────────
      - name: Post to Instagram
        env:
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IMAGE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/output.png
        run: python scripts/post_to_instagram.py
        continue-on-error: true

      # ── 9. حفظ السجل ───────────────────────────────────────
      - name: Commit Signal Log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals_log.csv || true
          git diff --cached --quiet || git commit -m "📊 إشارة جديدة"
          git push || true
        continue-on-error: true


  # ─── تتبع النتائج: يومياً بعد إغلاق السوق ────────────────
  track-results:
    runs-on: ubuntu-latest
    # كل يوم 3:30م KSA (12:30 UTC) أيام السوق
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Track Signal Results
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/track_results.py
        continue-on-error: true

      - name: Commit Results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals_log.csv || true
          git diff --cached --quiet || git commit -m "📈 تحديث النتائج"
          git push || true
        continue-on-error: true


  # ─── التقرير الأسبوعي: كل خميس 4:00م KSA ─────────────────
  weekly-report:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Generate Weekly Report
        run: python scripts/weekly_report.py

      - name: Send Report to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/post_dashboard_to_telegram.py
        continue-on-error: true
