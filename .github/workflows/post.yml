name: TASI AI — مضارب

on:
  workflow_dispatch:
  schedule:
    # كل 30 دقيقة أثناء ساعات السوق (9:30 - 15:00 KSA = 6:30-12:00 UTC)
    # أيام الأحد - الخميس
    - cron: "*/30 6-12 * * 0-4"

jobs:

  # ─── الوظيفة الرئيسية: فحص وإصدار الإشارة ───────────────
  auto-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: pip install -r requirements.txt

      # ── 1. جلب بيانات السوق وتحليلها ──────────────────────
      - name: Fetch & Analyze Market Data
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/fetch_api_data.py

      # ── 2. فحص جودة الإشارة — إذا فشل يتوقف كل شيء ───────
      - name: Check Signal Quality
        id: quality_check
        run: python scripts/should_post.py
        # لا continue-on-error هنا — يوقف الـ workflow إذا الإشارة ضعيفة

      # ── 3. توليد الصورة ────────────────────────────────────
      - name: Generate Post Image
        run: python scripts/generate_post.py

      # ── 4. تسجيل الإشارة في السجل ──────────────────────────
      - name: Log Signal
        run: python scripts/log_signal.py
        continue-on-error: true

      # ── 5. رفع الصورة على GitHub ───────────────────────────
      - name: Upload output.png to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/upload_output.py

      # ── 6. نشر على Telegram ────────────────────────────────
      - name: Post to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/post_to_telegram.py

      # ── 7. نشر على Facebook ────────────────────────────────
      - name: Post to Facebook
        env:
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IMAGE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/output.png
        run: python scripts/post_to_facebook.py
        continue-on-error: true

      # ── 8. نشر على Instagram ───────────────────────────────
      - name: Post to Instagram
        env:
          FB_PAGE_ID:    ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IMAGE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main/output.png
        run: python scripts/post_to_instagram.py
        continue-on-error: true

      # ── 9. حفظ السجل في GitHub ─────────────────────────────
      - name: Commit Signal Log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals_log.csv || true
          git diff --cached --quiet || git commit -m "📊 تسجيل إشارة جديدة"
          git push || true
        continue-on-error: true


  # ─── وظيفة مستقلة: تتبع نتائج الإشارات (يومياً بعد الإغلاق) ───
  track-results:
    runs-on: ubuntu-latest
    # يشتغل يومياً الساعة 3:30 مساءً KSA (12:30 UTC) بعد إغلاق السوق
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Track Signal Results
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/track_results.py
        continue-on-error: true

      - name: Commit Updated Results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals_log.csv || true
          git diff --cached --quiet || git commit -m "📈 تحديث نتائج الإشارات"
          git push || true
        continue-on-error: true


  # ─── تقرير أسبوعي كل خميس ────────────────────────────────
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Generate Weekly Report
        run: python scripts/weekly_report.py

      - name: Send Report to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/post_dashboard_to_telegram.py
        continue-on-error: true
