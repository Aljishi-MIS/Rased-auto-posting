name: Modareb Auto Pipeline

on:
  workflow_dispatch:
  schedule:
    # البوست اليومي — 9:30 صباحاً السعودية
    - cron: "30 6 * * 0-4"

    # التقرير الأسبوعي — الخميس 4:30 مساءً السعودية
    - cron: "30 13 * * 4"

jobs:
  daily-post:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 6 * * 0-4'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data
        run: |
          if [ -f scripts/fetch_api_data.py ]; then
            python scripts/fetch_api_data.py
          else
            echo "No API script found, skipping..."
          fi
        env:
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Generate post image
        run: python scripts/generate_post.py

      - name: Log signal
        run: python scripts/log_signal.py

      - name: Commit signal log
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/signals_log.csv data/daily.json
          git commit -m "Update daily signal log" || echo "No changes to commit"
          git push

      - name: Post to Telegram
        run: |
          if [ -f scripts/post_to_telegram.py ]; then
            python scripts/post_to_telegram.py
          else
            echo "Telegram script not found, skipping..."
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload post image
        uses: actions/upload-artifact@v4
        with:
          name: modareb-post
          path: output.png

  weekly-dashboard:
    if: github.event.schedule == '30 13 * * 4'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate weekly report
        run: python scripts/weekly_report.py

      - name: Commit weekly report
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/weekly_report.txt
          git commit -m "Update weekly report" || echo "No changes to commit"
          git push

      - name: Post dashboard to Telegram
        run: python scripts/post_dashboard_to_telegram.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
