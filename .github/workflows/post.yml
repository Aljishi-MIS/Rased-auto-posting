name: Modareb Auto Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 0-4"  # 10 صباحاً KSA
    - cron: "*/5 7-12 * * 0-4"  # كل 5 دقائق وقت السوق

jobs:
  daily-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt

      # 1️⃣ Smart Scanner
      - name: Fetch market data
        env:
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
        run: python scripts/fetch_api_data.py

      # 2️⃣ Generate Image
      - name: Generate post image
        run: python scripts/generate_post.py

      # 3️⃣ Log signal (مهم للإحصائيات)
      - name: Log signal
        run: python scripts/log_signal.py

      # 4️⃣ Send to Telegram
      - name: Post to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/post_to_telegram.py

      # 5️⃣ Upload artifact
      - name: Upload post image
        uses: actions/upload-artifact@v4
        with:
          name: modareb-post
          path: output.png


  weekly-dashboard:
    runs-on: ubuntu-latest
    needs: daily-post
    if: github.event.schedule == '0 7 * * 4'  # الخميس فقط

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Generate weekly report
        run: python scripts/weekly_report.py

      - name: Send dashboard to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/post_dashboard_to_telegram.py
