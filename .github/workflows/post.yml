name: TASI AI — مضارب | Auto Post

on:
  schedule:
    - cron: '0 7 * * 0-4'    # 10:00 صباحاً توقيت الرياض
    - cron: '0 9 * * 0-4'    # 12:00 ظهراً
    - cron: '0 11 * * 0-4'   # 02:00 عصراً
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests anthropic pillow

      - name: Create Data Directory
        run: mkdir -p data

      # ── الخطوة 1: تحليل أسهم تاسي واختيار Top 3 ──────────────
      - name: Analyze TASI Stocks
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/historical_analyzer.py

      # ── الخطوة 2: Claude يراجع Top 3 ─────────────────────────
      - name: Claude AI Review
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_api_data.py

      # ── الخطوة 3: فحص جودة الإشارة ───────────────────────────
      - name: Check Signal Quality
        run: python scripts/should_post.py

      # ── الخطوة 4: توليد الصورة ────────────────────────────────
      - name: Generate Signal Image
        run: python scripts/generate_post.py

      # ── الخطوة 5: نشر الإشارة اليومية على تلغرام ─────────────
      - name: Post Daily Signal to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python - <<'EOF'
          import os, json, requests

          token      = os.environ["TELEGRAM_BOT_TOKEN"]
          channel_id = os.environ["TELEGRAM_CHANNEL_ID"]

          with open("data/daily.json", encoding="utf-8") as f:
              sig = json.load(f)

          is_golden  = sig.get("is_golden", False)
          tag        = "⭐ إشارة ذهبية" if is_golden else "📈 إشارة يومية"
          warning    = sig.get("claude_warning", None)

          caption = f"""{tag}
━━━━━━━━━━━━━━━━━━━━━━━━━
🏦 {sig.get('stock_name','')} ({sig.get('symbol','')})

💰 نقطة الدخول : {sig.get('entry','')} ريال
🎯 الهدف الأول : {sig.get('target1','')} ريال (+{sig.get('target1_pct','')}%)
🎯 الهدف الثاني: {sig.get('target2','')} ريال (+{sig.get('target2_pct','')}%)
🛑 وقف الخسارة : {sig.get('stop_loss','')} ريال (-{sig.get('stop_loss_pct','')}%)

⏱ الإطار الزمني: {sig.get('expected_days',7)} أيام (أقصاه {sig.get('max_days',10)})
⚖️ مكافأة/مخاطرة: {sig.get('rr','')}:1
📊 قوة الإشارة : {sig.get('score','')}/100
🤖 ثقة Claude  : {sig.get('claude_confidence', sig.get('score',''))}%

💡 {sig.get('claude_reason','')}
{f"⚠️ {warning}" if warning else ""}
━━━━━━━━━━━━━━━━━━━━━━━━━
⚠️ تحليلات تعليمية فقط — المستثمر يتخذ قراره بنفسه""".strip()

          with open("data/signal_image.png", "rb") as img:
              r = requests.post(
                  f"https://api.telegram.org/bot{token}/sendPhoto",
                  data={"chat_id": channel_id, "caption": caption},
                  files={"photo": img},
                  timeout=30
              )
          if r.status_code == 200:
              print("✅ نُشرت الإشارة اليومية")
          else:
              print(f"❌ فشل النشر: {r.text}")
              exit(1)
          EOF

      # ── الخطوة 6: نشر الإشارة الذهبية إن وجدت ───────────────
      - name: Post Golden Signal to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python - <<'EOF'
          import os, json, requests

          if not os.path.exists("data/golden_signal.json"):
              print("ℹ️  لا توجد إشارة ذهبية اليوم")
              exit(0)

          token      = os.environ["TELEGRAM_BOT_TOKEN"]
          channel_id = os.environ["TELEGRAM_CHANNEL_ID"]

          with open("data/golden_signal.json", encoding="utf-8") as f:
              sig = json.load(f)

          warning = sig.get("claude_warning", None)

          caption = f"""⭐ إشارة ذهبية حصرية ⭐
━━━━━━━━━━━━━━━━━━━━━━━━━
🏦 {sig.get('stock_name','')} ({sig.get('symbol','')})

💰 نقطة الدخول : {sig.get('entry','')} ريال
🎯 الهدف الأول : {sig.get('target1','')} ريال (+{sig.get('target1_pct','')}%)
🎯 الهدف الثاني: {sig.get('target2','')} ريال (+{sig.get('target2_pct','')}%)
🛑 وقف الخسارة : {sig.get('stop_loss','')} ريال (-{sig.get('stop_loss_pct','')}%)

⏱ الإطار الزمني: {sig.get('expected_days',7)} أيام (أقصاه {sig.get('max_days',10)})
⚖️ مكافأة/مخاطرة: {sig.get('rr','')}:1
📊 قوة الإشارة : {sig.get('score','')}/100
🤖 ثقة Claude  : {sig.get('claude_confidence', sig.get('score',''))}%

💡 {sig.get('claude_reason','')}
{f"⚠️ {warning}" if warning else ""}
━━━━━━━━━━━━━━━━━━━━━━━━━
⚠️ تحليلات تعليمية فقط — المستثمر يتخذ قراره بنفسه""".strip()

          with open("data/golden_image.png", "rb") as img:
              r = requests.post(
                  f"https://api.telegram.org/bot{token}/sendPhoto",
                  data={"chat_id": channel_id, "caption": caption},
                  files={"photo": img},
                  timeout=30
              )
          print("✅ نُشرت الإشارة الذهبية" if r.status_code == 200
                else f"❌ {r.text}")
          EOF

      # ── الخطوة 7: حفظ السجل ───────────────────────────────────
      - name: Save & Commit Signal Log
        run: |
          python - <<'EOF'
          import json, csv, os

          for fname, stype in [
              ("data/daily.json",  "daily"),
              ("data/golden_signal.json", "golden")
          ]:
              if not os.path.exists(fname):
                  continue
              with open(fname, encoding="utf-8") as f:
                  sig = json.load(f)
              log_file = "data/signals_log.csv"
              exists   = os.path.exists(log_file)
              with open(log_file, "a", newline="", encoding="utf-8") as f:
                  fields = ["date","time","type","symbol","stock_name",
                            "entry","target1","target2","stop_loss",
                            "target1_pct","target2_pct","score",
                            "claude_confidence","status"]
                  w = csv.DictWriter(f, fieldnames=fields)
                  if not exists:
                      w.writeheader()
                  w.writerow({
                      "date":             sig.get("date",""),
                      "time":             sig.get("time",""),
                      "type":             stype,
                      "symbol":           sig.get("symbol",""),
                      "stock_name":       sig.get("stock_name",""),
                      "entry":            sig.get("entry",""),
                      "target1":          sig.get("target1",""),
                      "target2":          sig.get("target2",""),
                      "stop_loss":        sig.get("stop_loss",""),
                      "target1_pct":      sig.get("target1_pct",""),
                      "target2_pct":      sig.get("target2_pct",""),
                      "score":            sig.get("score",""),
                      "claude_confidence":sig.get("claude_confidence",""),
                      "status":           "open"
                  })
          EOF

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals_log.csv || true
          git diff --staged --quiet || git commit -m "📊 سجل إشارة $(date +'%Y-%m-%d %H:%M')"
          git push || true
