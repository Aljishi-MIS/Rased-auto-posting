name: TASI AI — مضارب | Auto Post

on:
  schedule:
    # يعمل كل يوم من الأحد إلى الخميس
    - cron: '0 7 * * 0-4'   # 10:00 صباحاً بتوقيت الرياض (UTC+3)
    - cron: '0 9 * * 0-4'   # 12:00 ظهراً
    - cron: '0 11 * * 0-4'  # 02:00 عصراً
  workflow_dispatch:          # تشغيل يدوي

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      # ── 1. سحب الكود ──────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. إعداد Python ───────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. تثبيت المكتبات ─────────────────────────────────────
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests anthropic pillow

      # ── 4. إنشاء مجلد data ────────────────────────────────────
      - name: Create Data Directory
        run: mkdir -p data

      # ── 5. جلب وتحليل بيانات السوق ───────────────────────────
      - name: Fetch & Analyze Market Data
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_api_data.py

      # ── 6. فحص جودة الإشارة ───────────────────────────────────
      - name: Check Signal Quality
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/should_post.py

      # ── 7. تحليل الإشارة وانتقاء الأفضل ──────────────────────
      - name: Analyze & Select Best Signal
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_URL: ${{ secrets.API_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/historical_analyzer.py

      # ── 8. توليد صورة الإشارة ─────────────────────────────────
      - name: Generate Signal Image
        run: python scripts/generate_post.py

      # ── 9. نشر الإشارة اليومية على تلغرام ────────────────────
      - name: Post Daily Signal to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python - <<'EOF'
          import os, json, requests

          token      = os.environ["TELEGRAM_BOT_TOKEN"]
          channel_id = os.environ["TELEGRAM_CHANNEL_ID"]

          # قراءة بيانات الإشارة
          with open("data/daily.json", encoding="utf-8") as f:
              sig = json.load(f)

          name       = sig.get("stock_name", "")
          symbol     = sig.get("symbol", "")
          entry      = sig.get("entry", 0)
          t1         = sig.get("target1", 0)
          t2         = sig.get("target2", 0)
          sl         = sig.get("stop_loss", 0)
          t1_pct     = sig.get("target1_pct", 0)
          t2_pct     = sig.get("target2_pct", 0)
          sl_pct     = sig.get("stop_loss_pct", 0)
          rr         = sig.get("rr", 0)
          score      = sig.get("score", 0)
          days_exp   = sig.get("expected_days", 7)
          days_max   = sig.get("max_days", 10)
          reason     = sig.get("claude_reason", "")
          confidence = sig.get("claude_confidence", score)
          warning    = sig.get("claude_warning", None)
          is_golden  = sig.get("is_golden", False)

          tag = "⭐ إشارة ذهبية" if is_golden else "📈 إشارة يومية"

          caption = f"""
{tag}
━━━━━━━━━━━━━━━━━━━━━━━━━
🏦 {name} ({symbol})

💰 نقطة الدخول : {entry} ريال
🎯 الهدف الأول : {t1} ريال (+{t1_pct}%)
🎯 الهدف الثاني: {t2} ريال (+{t2_pct}%)
🛑 وقف الخسارة : {sl} ريال (-{sl_pct}%)

⏱ الإطار الزمني: {days_exp} أيام (أقصاه {days_max})
⚖️ مكافأة/مخاطرة: {rr}:1
📊 قوة الإشارة : {score}/100
🤖 ثقة الذكاء الاصطناعي: {confidence}%

💡 {reason}
{f"⚠️ {warning}" if warning else ""}
━━━━━━━━━━━━━━━━━━━━━━━━━
⚠️ هذه تحليلات تعليمية فقط
المستثمر يتخذ قراره بنفسه
          """.strip()

          # إرسال الصورة مع النص
          with open("data/signal_image.png", "rb") as img:
              r = requests.post(
                  f"https://api.telegram.org/bot{token}/sendPhoto",
                  data={"chat_id": channel_id, "caption": caption},
                  files={"photo": img},
                  timeout=30
              )
          print("✅ نُشرت الإشارة اليومية" if r.status_code == 200
                else f"❌ فشل النشر: {r.text}")
          EOF

      # ── 10. نشر الإشارة الذهبية (إن وجدت) ───────────────────
      - name: Post Golden Signal to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python - <<'EOF'
          import os, json, requests

          if not os.path.exists("data/golden_signal.json"):
              print("ℹ️  لا توجد إشارة ذهبية اليوم")
              exit(0)

          token      = os.environ["TELEGRAM_BOT_TOKEN"]
          channel_id = os.environ["TELEGRAM_CHANNEL_ID"]

          with open("data/golden_signal.json", encoding="utf-8") as f:
              sig = json.load(f)

          name       = sig.get("stock_name", "")
          symbol     = sig.get("symbol", "")
          entry      = sig.get("entry", 0)
          t1         = sig.get("target1", 0)
          t2         = sig.get("target2", 0)
          sl         = sig.get("stop_loss", 0)
          t1_pct     = sig.get("target1_pct", 0)
          t2_pct     = sig.get("target2_pct", 0)
          sl_pct     = sig.get("stop_loss_pct", 0)
          rr         = sig.get("rr", 0)
          score      = sig.get("score", 0)
          days_exp   = sig.get("expected_days", 7)
          days_max   = sig.get("max_days", 10)
          reason     = sig.get("claude_reason", "")
          confidence = sig.get("claude_confidence", score)
          warning    = sig.get("claude_warning", None)

          caption = f"""
⭐ إشارة ذهبية حصرية ⭐
━━━━━━━━━━━━━━━━━━━━━━━━━
🏦 {name} ({symbol})

💰 نقطة الدخول : {entry} ريال
🎯 الهدف الأول : {t1} ريال (+{t1_pct}%)
🎯 الهدف الثاني: {t2} ريال (+{t2_pct}%)
🛑 وقف الخسارة : {sl} ريال (-{sl_pct}%)

⏱ الإطار الزمني: {days_exp} أيام (أقصاه {days_max})
⚖️ مكافأة/مخاطرة: {rr}:1
📊 قوة الإشارة : {score}/100
🤖 ثقة الذكاء الاصطناعي: {confidence}%

💡 {reason}
{f"⚠️ {warning}" if warning else ""}
━━━━━━━━━━━━━━━━━━━━━━━━━
⚠️ هذه تحليلات تعليمية فقط
المستثمر يتخذ قراره بنفسه
          """.strip()

          with open("data/golden_image.png", "rb") as img:
              r = requests.post(
                  f"https://api.telegram.org/bot{token}/sendPhoto",
                  data={"chat_id": channel_id, "caption": caption},
                  files={"photo": img},
                  timeout=30
              )
          print("✅ نُشرت الإشارة الذهبية" if r.status_code == 200
                else f"❌ فشل النشر: {r.text}")
          EOF

      # ── 11. حفظ السجل في الـ Repository ──────────────────────
      - name: Save Signal Log
        run: |
          python - <<'EOF'
          import json, csv, os
          from datetime import datetime

          for fname, stype in [("data/daily.json","daily"), ("data/golden_signal.json","golden")]:
              if not os.path.exists(fname):
                  continue
              with open(fname, encoding="utf-8") as f:
                  sig = json.load(f)
              log_file = "data/signals_log.csv"
              exists   = os.path.exists(log_file)
              with open(log_file, "a", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=[
                      "date","time","type","symbol","stock_name",
                      "entry","target1","target2","stop_loss",
                      "target1_pct","target2_pct","score",
                      "claude_confidence","status"
                  ])
                  if not exists: w.writeheader()
                  w.writerow({
                      "date":             sig.get("date",""),
                      "time":             sig.get("time",""),
                      "type":             stype,
                      "symbol":           sig.get("symbol",""),
                      "stock_name":       sig.get("stock_name",""),
                      "entry":            sig.get("entry",""),
                      "target1":          sig.get("target1",""),
                      "target2":          sig.get("target2",""),
                      "stop_loss":        sig.get("stop_loss",""),
                      "target1_pct":      sig.get("target1_pct",""),
                      "target2_pct":      sig.get("target2_pct",""),
                      "score":            sig.get("score",""),
                      "claude_confidence":sig.get("claude_confidence",""),
                      "status":           "open"
                  })
          EOF

      - name: Commit Signal Log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/signals_log.csv || true
          git diff --staged --quiet || git commit -m "📊 تحديث سجل الإشارات $(date +'%Y-%m-%d %H:%M')"
          git push || true
